name: Sync to CNB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute CNB target
        id: target
        env:
          CNB_NAMESPACE: ${{ vars.CNB_NAMESPACE }}
        run: |
          set -euo pipefail
          repo_name="${GITHUB_REPOSITORY#*/}"
          namespace="${CNB_NAMESPACE:-${GITHUB_REPOSITORY_OWNER}}"
          echo "repo_name=$repo_name" >> "$GITHUB_OUTPUT"
          echo "namespace=$namespace" >> "$GITHUB_OUTPUT"

      - name: Sync to CNB repository
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${CNB_TOKEN:-}" ]; then
            echo "Missing required secret: CNB_TOKEN" >&2
            exit 1
          fi

          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            -e PLUGIN_TARGET_URL="https://cnb.cool/${{ steps.target.outputs.namespace }}/${{ steps.target.outputs.repo_name }}.git" \
            -e PLUGIN_AUTH_TYPE="https" \
            -e PLUGIN_USERNAME="cnb" \
            -e PLUGIN_PASSWORD="${CNB_TOKEN}" \
            -e PLUGIN_FORCE="true" \
            tencentcom/git-sync
